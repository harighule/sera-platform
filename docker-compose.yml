# =====================================================================
# PRODUCTION DEPLOYMENT – LARGE SCALE
#
# Services:
#   - db        : PostgreSQL (primary data store)
#   - redis     : In‑memory cache & rate‑limiting store
#   - neo4j     : Graph database (causal relationships)
#   - kali      : Persistent Kali container (tools for ReconAgent)
#   - backend   : FastAPI + Gunicorn (4 Uvicorn workers)
#   - nginx     : Load balancer / reverse proxy (TLS termination)
# =====================================================================
version: '3.9'

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

services:
  # ---------- POSTGRESQL (Primary Database) ----------
  db:
    image: postgres:16-alpine
    container_name: sera-db
    environment:
      POSTGRES_USER: sera_user
      POSTGRES_PASSWORD: sera_pass
      POSTGRES_DB: sera_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U sera_user -d sera_db"]
    networks:
      - sera-net
    restart: unless-stopped

  # ---------- REDIS (Caching / Rate Limiting) ----------
  redis:
    image: redis:7-alpine
    container_name: sera-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - sera-net
    restart: unless-stopped

  # ---------- NEO4J (Graph Database) ----------
  neo4j:
    image: neo4j:5-community
    container_name: sera-neo4j
    environment:
      NEO4J_AUTH: neo4j/SeraGraphPass2026!
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - sera-net
    restart: unless-stopped

  # ---------- KALI TOOLS (Persistent Sidecar) ----------
  kali:
    build:
      context: ./kali
      dockerfile: Dockerfile.kali
    image: custom-kali:latest
    container_name: sera-kali
    command: tail -f /dev/null
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    networks:
      - sera-net
    restart: unless-stopped

  # ---------- BACKEND API (Scalable Workers) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sera-backend
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://sera_user:sera_pass@db:5432/sera_db
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # LLM / AI (use .env or override)
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      AI_BASE_URL: ${AI_BASE_URL:-https://integrate.api.nvidia.com/v1}
      AI_API_KEY: ${AI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_MODEL: ${AI_MODEL:-meta/llama-3.1-8b-instruct}
      # Other config (pass through .env)
      ENTITY_MODE: ${ENTITY_MODE:-live}
      DEMO_API_KEY: ${DEMO_API_KEY:-sera-demo-2026}
      USE_REAL_DATA: ${USE_REAL_DATA:-false}
      SEC_IDENTITY_EMAIL: ${SEC_IDENTITY_EMAIL}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      AIS_STREAM_KEY: ${AIS_STREAM_KEY}
      APIFY_TOKEN: ${APIFY_TOKEN}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-SeraGraphPass2026!}
      # Kali image
      KALI_IMAGE: custom-kali:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kali:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # ---------- SCALING: 4 Uvicorn workers behind Gunicorn ----------
    command: >
      gunicorn main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --access-logfile -
      --error-logfile -
    networks:
      - sera-net
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]

  # ---------- NGINX (Load Balancer & TLS Terminator) ----------
  nginx:
    image: nginx:alpine
    container_name: sera-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro   # Optional: mount certificates
    depends_on:
      - backend
    networks:
      - sera-net
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]

# ---------- VOLUMES ----------
volumes:
  pgdata:
  redis_data:
  neo4j_data:

# ---------- NETWORK ----------
networks:
  sera-net:
    driver: bridge